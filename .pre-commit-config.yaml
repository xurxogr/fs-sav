repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
  - id: check-added-large-files
    exclude: ^tests/fixtures/.*\.sav$
  - id: check-toml

- repo: local
  hooks:
  # Rust hooks
  - id: cargo-fmt
    name: cargo fmt
    entry: cargo fmt --
    language: system
    types: [rust]
    pass_filenames: false
  - id: cargo-clippy
    name: cargo clippy
    entry: cargo clippy -- -D warnings
    language: system
    types: [rust]
    pass_filenames: false
  - id: cargo-test
    name: cargo test
    entry: cargo test
    language: system
    types: [rust]
    pass_filenames: false

  # Python hooks
  - id: ruff-check
    name: ruff check
    entry: ruff check
    language: system
    types: [python]
    args: [--fix, --exit-non-zero-on-fix]
  - id: ruff-format
    name: ruff format
    entry: ruff format
    language: system
    types: [python]
  - id: mypy
    name: mypy
    entry: mypy
    language: system
    types: [python]
    require_serial: true
    exclude: ^tests/
